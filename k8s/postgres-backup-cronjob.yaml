apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: mythos-aegis
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: mythos-aegis
spec:
  # Run daily at 02:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: backup
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  BACKUP_DIR=/backups
                  KEEP_LAST=7
                  TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
                  FILENAME="aegis_${TIMESTAMP}.sql.gz"
                  DEST="${BACKUP_DIR}/${FILENAME}"

                  # Parse DATABASE_URL — credentials never printed.
                  _url="${DATABASE_URL#postgresql://}"
                  _url="${_url#postgres://}"
                  export PGUSER="${_url%%:*}"
                  _rest="${_url#*:}"
                  export PGPASSWORD="${_rest%%@*}"
                  _rest="${_rest#*@}"
                  export PGHOST="${_rest%%:*}"
                  _rest="${_rest#*:}"
                  export PGPORT="${_rest%%/*}"
                  export PGDATABASE="${_rest#*/}"
                  PGDATABASE="${PGDATABASE%%\?*}"

                  mkdir -p "${BACKUP_DIR}"
                  echo "[backup] Writing ${DEST}"
                  pg_dump --no-password --format=plain --no-privileges --no-owner \
                    | gzip -9 > "${DEST}"
                  echo "[backup] Done: $(du -sh "${DEST}" | cut -f1)"

                  # Rotate — keep last KEEP_LAST
                  ls -1t "${BACKUP_DIR}"/aegis_*.sql.gz 2>/dev/null \
                    | tail -n +"$((KEEP_LAST + 1))" \
                    | xargs -r rm -f --
                  echo "[backup] Rotation complete."
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: mythos-aegis-secrets
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: mythos-aegis
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: mythos-aegis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
