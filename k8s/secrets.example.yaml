# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE ONLY — NEVER COMMIT REAL VALUES.
#
# This file documents the Secret schema.  Create the real secret with:
#
#   kubectl create secret generic mythos-aegis-secrets \
#     --namespace=mythos-aegis \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://user:pass@host:5432/db' \
#     --from-literal=JWT_SECRET="$(python -c 'import secrets; print(secrets.token_hex(32))')" \
#     --from-literal=JWT_PREVIOUS_SECRET='' \
#     --from-literal=REDIS_URL='redis://redis:6379/0'
#
# For GitOps workflows, manage secrets with one of:
#   - Sealed Secrets  https://sealed-secrets.netlify.app
#   - External Secrets Operator  https://external-secrets.io
#   - HashiCorp Vault Agent Injector
#   - AWS Secrets Manager CSI driver
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mythos-aegis-secrets
  namespace: mythos-aegis
  labels:
    app.kubernetes.io/name: mythos-aegis
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: mythos-aegis
type: Opaque
stringData:
  # PostgreSQL async connection string.
  # Format: postgresql+asyncpg://<user>:<password>@<host>:<port>/<database>
  DATABASE_URL: "postgresql+asyncpg://REPLACE_USER:REPLACE_PASSWORD@postgres:5432/mythos_aegis"

  # JWT signing secret — must be ≥32 characters in production.
  # The app refuses to start if this is absent, short, or the dev default.
  # Generate: python -c "import secrets; print(secrets.token_hex(32))"
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET_MINIMUM_32_CHARS_LONG"

  # Previous signing key — set only during zero-downtime key rotation.
  # Leave empty until a rotation is in progress; clear after rotation completes.
  JWT_PREVIOUS_SECRET: ""

  # Redis URL for rate limiting.  The app degrades gracefully (fail-open)
  # if Redis is unreachable — this secret is not a hard startup dependency.
  REDIS_URL: "redis://redis:6379/0"
