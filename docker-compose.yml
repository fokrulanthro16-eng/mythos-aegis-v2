version: "3.9"

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mythos_aegis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mythos_aegis}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  # Used for rate limiting.  The API degrades gracefully when Redis is
  # unavailable so this service is not a hard dependency.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Mythos Aegis API ───────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # Redis is soft-dependency: API starts even if Redis is not healthy.
      redis:
        condition: service_started
    environment:
      # Constructed from POSTGRES_* vars so both services stay in sync.
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mythos_aegis}
      APP_ENV: ${APP_ENV:-development}
      # JWT — override all three in production via a real .env file.
      JWT_SECRET: ${JWT_SECRET:-mythos-aegis-dev-secret-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-mythos-aegis}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mythos-aegis-api}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-3600}
      SQL_TIMEOUT_SECONDS: ${SQL_TIMEOUT_SECONDS:-3}
      SQL_MAX_LIMIT: ${SQL_MAX_LIMIT:-100}
      INTENT_CONFIDENCE_THRESHOLD: ${INTENT_CONFIDENCE_THRESHOLD:-0.85}
      # Redis — the service name is used as the host.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # OpenTelemetry — disabled by default; point at a real collector in staging/prod.
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-mythos-aegis}
      # Used by entrypoint.sh to check postgres connectivity before migrating.
      DB_HOST: postgres
      DB_PORT: "5432"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
